<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' %VITE_API_URL%; img-src 'self' data:;"
    />
    <title>Peach Web</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("peach_theme") || "light";
          if (t === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
